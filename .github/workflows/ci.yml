name: ESP32 Pocket-Dial Firmware CI

on:
  push:
    branches: [ main, master, 'feature/**' ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Build and simulate the host desktop application, run static analysis and unit/smoke tests.
  # This serves as our simulation-based test suite, validating SIP and HTTP server logic on host runners.
  build-and-test-host:
    name: Host Build & Simulation Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential cppcheck clang-tidy jq curl

      - name: Run Static Analysis (cppcheck)
        run: |
          cppcheck --error-exitcode=1 \
                   --enable=warning,performance \
                   --inline-suppr \
                   --suppress=missingIncludeSystem \
                   --suppress=unmatchedSuppression \
                   --suppress=*:main/ui/qrcode.c \
                   --suppress=*:main/ui/qrcode.h \
                   --suppress=unknownMacro:main/ui/ui.cpp \
                   -I src/Helpers -I src/SIP -I main \
                   src/ main/

      - name: Configure CMake (Host Build)
        run: |
          # Export the compile DB so the clang-tidy step below can analyze the
          # project's own sources with the exact host compile flags.
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build Host Binary
        run: |
          cmake --build build --config Release

      - name: Static Analysis (clang-tidy over src/**)
        # NON-BLOCKING by design. clang-tidy runs as a real check over the
        # project's own first-party sources (src/**) using the CMake compile DB,
        # but the EXISTING Phase-1 source tree carries ~59 pre-existing
        # performance/bugprone findings (e.g. pass-by-value params, endl flushes,
        # an intentional widening multiply in the OTA size clamp). This task is
        # not allowed to modify those files, and the brief is explicit: clang-tidy
        # must not block the pipeline on pre-existing issues. So this step is
        # `continue-on-error` and prints a diagnostic count — it surfaces NEW
        # regressions in the logs/annotations without failing CI. Tighten or drop
        # `continue-on-error` once the baseline is cleaned up in a follow-up.
        continue-on-error: true
        run: |
          echo "Running clang-tidy over first-party sources (src/**)..."
          CHECKS="-*,bugprone-*,performance-*,clang-analyzer-*,-bugprone-easily-swappable-parameters,-bugprone-narrowing-conversions"
          : > clang-tidy.log
          # Only our own translation units; header-filter keeps third-party /
          # system headers out of the report.
          while IFS= read -r f; do
            echo "--- $f ---"
            clang-tidy -p build --quiet \
                       --header-filter='.*/src/.*' \
                       --checks="$CHECKS" \
                       "$f" 2>&1 | tee -a clang-tidy.log || true
          done < <(find src -name '*.cpp' | sort)
          COUNT=$(grep -cE "warning:|error:" clang-tidy.log || true)
          echo "================================================================"
          echo "clang-tidy total diagnostics: ${COUNT} (pre-existing baseline ~59)"
          echo "Diagnostics by check:"
          grep -oE "\[[a-z0-9-]+(,[a-z0-9-]+)*\]$" clang-tidy.log | sort | uniq -c | sort -rn || true
          echo "================================================================"

      - name: Run Unit Test Suite (GoogleTest via CTest)
        run: |
          # The sip_parser_tests target is registered with CTest in
          # tests/CMakeLists.txt. Because the root CMakeLists.txt enables testing
          # only inside the tests/ subdirectory, the CTest test set lives at
          # build/tests (not the build root) — so we point ctest there. ctest
          # returns non-zero on any test failure, which FAILS this step (the gate).
          ctest --test-dir build/tests --output-on-failure

      - name: Verify Partition Tables (dual-OTA layout guard, both layouts)
        run: |
          # Issue #59 [M-7]: the guard now lives in tests/ci/partition_guard.py and
          # loops over BOTH shipped layouts (partitions.csv @16MB +
          # partitions_4mb.csv @4MB) with overlap + 64KB/4KB alignment checks, not
          # just partitions.csv. It exits non-zero on any dual-OTA regression,
          # overflow, overlap, misalignment, or unequal OTA slots.
          python3 tests/ci/partition_guard.py

      - name: Self-test the Partition Guard (proves it catches bad layouts)
        run: |
          # Issue #59: a guard is only a gate if it actually fails on a bad table.
          # This drives deliberately-broken layouts through partition_guard.py and
          # asserts each one is rejected (exit non-zero) — and the shipped ones pass.
          bash tests/ci/test_partition_guard.sh

      - name: Self-test the Deployment Audit (proves it blocks violations)
        run: |
          # Issue #60 [M-8]: proves the deployment guardrail EXITS NON-ZERO on a
          # planted gcloud/GCP_SA_KEY reference (the old step never did) and that
          # the allowlist escape hatch works. Run in the host job so the regression
          # guard travels with the unit suite.
          bash tests/ci/test_deployment_audit.sh

      - name: Execute HTTP API Smoke Suite (host)
        run: |
          # Single source of truth: tests/http/test_api.sh is the ONE HTTP smoke
          # suite, used both here (host build) and on real hardware. It runs, in
          # this order: happy-path -> CSRF -> input-validation (16 KB cap) ->
          # 404 -> OTA (while UNPROVISIONED) -> admin-auth (LAST, sets a PIN).
          echo "Starting simulated SIP & HTTP Server (5060 SIP / 8080 dashboard)..."
          ./build/SipServer --ip 127.0.0.1 --port 5060 --web 8080 </dev/null &
          SERVER_PID=$!
          export SERVER_PID

          # Wait for the HTTP port to accept connections (bounded).
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/ || echo 000)
            [ "$code" = "200" ] && break
            sleep 0.5
          done

          if ! kill -0 "$SERVER_PID" 2>/dev/null; then
            echo "Error: SipServer failed to start or crashed on boot."
            exit 1
          fi
          echo "Simulated Server is active (PID: $SERVER_PID). Running test_api.sh..."

          # The script exports SERVER_PID-awareness: the OTA-reboot test asserts the
          # process is STILL ALIVE afterwards (the desktop reboot must be a no-op).
          set +e
          bash tests/http/test_api.sh 127.0.0.1:8080
          RC=$?
          set -e

          echo "Shutting down Simulated Server..."
          kill -9 "$SERVER_PID" 2>/dev/null || true

          if [ "$RC" -ne 0 ]; then
            echo "HTTP API smoke suite FAILED (exit $RC)."
            exit "$RC"
          fi
          echo "HTTP API smoke suite PASSED."

  # Job 2: Build firmware for target ESP32 and ESP32-S3 boards using official Espressif Docker Images.
  # This establishes compiler verification across multiple ESP-IDF versions and target architectures.
  build-esp-idf:
    name: Build Firmware (ESP-IDF Matrix)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        idf-version: [ 'v6.0.1' ]
        target-chip: [ 'esp32', 'esp32s3' ]
        sip-transport: [ 'wifi', 'eth' ]
        # The "display" transport is esp32s3-only and pulls heavy managed
        # components (lvgl ^8.3.11, esp_lcd_touch, the AXS15231B driver — see
        # main/idf_component.yml). Built on esp32s3 + ESP-IDF v6.0.1 (set-target +
        # build), so it is added as a single include leg rather than expanding the
        # full matrix.
        include:
          - idf-version: 'v6.0.1'
            target-chip: 'esp32s3'
            sip-transport: 'display'

    container:
      image: espressif/idf:${{ matrix.idf-version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache ESP-IDF Build Artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            build
          key: ${{ runner.os }}-idf-${{ matrix.idf-version }}-${{ matrix.target-chip }}-${{ matrix.sip-transport }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-idf-${{ matrix.idf-version }}-${{ matrix.target-chip }}-${{ matrix.sip-transport }}-

      - name: Export Environment & Build Firmware
        run: |
          # 1. Initialize ESP-IDF build environment
          . $IDF_PATH/export.sh
          
          # 2. Configure target board architecture
          idf.py set-target ${{ matrix.target-chip }}
          
          # 3. Build firmware with specified transport layer configuration
          idf.py -D SIP_TRANSPORT=${{ matrix.sip-transport }} build
          
          echo "Successful compilation for ${{ matrix.target-chip }} on ESP-IDF ${{ matrix.idf-version }} (Transport: ${{ matrix.sip-transport }})"

  # Job 3: Security & Guardrails
  # Explicitly validates that no accidental GCP or outside deployment files are configured.
  deployment-audit:
    name: Deployment Guardrail Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Audit for GCP Deployments (BLOCKING)
        run: |
          # Issue #60 [M-8]: this guardrail is now ENFORCED. The previous inline
          # step set FOUND_VIOLATION=true but never exited non-zero ("Do not fail
          # build"), so a committed gcloud/aws/GCP_SA_KEY reference passed CI
          # silently. tests/ci/deployment_audit.sh exits 1 on any un-allowlisted
          # forbidden reference; intentional/documentary mentions go in
          # tests/ci/deployment_audit_allow.txt (the human-in-the-loop sign-off).
          bash tests/ci/deployment_audit.sh
